<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search · Vigil</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Berkeley Mono", "Fira Code", "Cascadia Code", monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2.5rem 2rem;
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.75;
  }
  .back { font-size: 0.8rem; color: #484f58; margin-bottom: 2.5rem; }
  .back a { color: #58a6ff; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
  .page-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.14em; color: #58a6ff; margin-bottom: 0.5rem; }
  h1 { color: #e6edf3; font-size: 1.6rem; font-weight: bold; margin-bottom: 0.3rem; }
  .meta { font-size: 0.8rem; color: #484f58; margin-bottom: 2rem; }
  .search-wrap {
    margin-bottom: 2rem;
  }
  #search-input {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus {
    border-color: #58a6ff;
  }
  #search-input::placeholder {
    color: #484f58;
  }
  .filter-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.65rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    font-family: inherit;
    font-size: 0.7rem;
    padding: 0.18rem 0.6rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: border-color 0.1s, color 0.1s;
  }
  .filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .filter-btn.active { border-color: #58a6ff; color: #58a6ff; }
  #search-hint {
    font-size: 0.75rem;
    color: #484f58;
    margin-top: 0.6rem;
  }
  #results {
    margin-top: 0.5rem;
  }
  .result-item {
    border-top: 1px solid #21262d;
    padding: 1.4rem 0;
  }
  .result-item:last-child {
    border-bottom: 1px solid #21262d;
  }
  .result-meta-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.2rem;
  }
  .result-num {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #484f58;
  }
  .result-type {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #484f58;
    border: 1px solid #30363d;
    padding: 0 0.3rem;
    line-height: 1.6;
  }
  .result-type.letter { color: #c8966e; border-color: #5a3e2a; }
  .result-title {
    font-size: 0.95rem;
    font-weight: bold;
    margin-bottom: 0.4rem;
  }
  .result-title a {
    color: #e6edf3;
    text-decoration: none;
  }
  .result-title a:hover {
    color: #58a6ff;
    text-decoration: underline;
  }
  .result-excerpt {
    font-size: 0.82rem;
    color: #8b949e;
    line-height: 1.6;
  }
  .result-excerpt mark {
    background: #2d3748;
    color: #f0c674;
    border-radius: 2px;
    padding: 0 2px;
  }
  .no-results {
    font-size: 0.88rem;
    color: #484f58;
    padding: 1.5rem 0;
    border-top: 1px solid #21262d;
  }
  .loading {
    font-size: 0.88rem;
    color: #484f58;
    padding: 1.5rem 0;
  }
  .all-entries {
    margin-top: 0.5rem;
  }
  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid #21262d;
    font-size: 0.72rem;
    color: #484f58;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* Light theme */
  html[data-theme="light"] body { background: #f6f8fa; color: #24292e; }
  html[data-theme="light"] h1 { color: #1c2128; }
  html[data-theme="light"] .meta { color: #656d76; }
  html[data-theme="light"] #search-input { background: #fff; border-color: #d0d7de; color: #24292e; }
  html[data-theme="light"] #search-input:focus { border-color: #0969da; }
  html[data-theme="light"] #search-input::placeholder { color: #8c959f; }
  html[data-theme="light"] .filter-btn { border-color: #d0d7de; color: #57606a; }
  html[data-theme="light"] .filter-btn:hover { border-color: #0969da; color: #0969da; }
  html[data-theme="light"] .filter-btn.active { border-color: #0969da; color: #0969da; }
  html[data-theme="light"] #search-hint { color: #8c959f; }
  html[data-theme="light"] .result-item { border-color: #d0d7de; }
  html[data-theme="light"] .result-item:last-child { border-color: #d0d7de; }
  html[data-theme="light"] .result-num { color: #8c959f; }
  html[data-theme="light"] .result-type { color: #8c959f; border-color: #d0d7de; }
  html[data-theme="light"] .result-type.letter { color: #953800; border-color: #f9d0a0; }
  html[data-theme="light"] .result-title a { color: #1c2128; }
  html[data-theme="light"] .result-title a:hover { color: #0969da; }
  html[data-theme="light"] .result-excerpt { color: #57606a; }
  html[data-theme="light"] .result-excerpt mark { background: #fff8c5; color: #953800; }
  html[data-theme="light"] .no-results { color: #8c959f; border-color: #d0d7de; }
  html[data-theme="light"] footer { border-color: #d0d7de; color: #8c959f; }
  html[data-theme="light"] a { color: #0969da; }
</style>
</head>
<body>

<div class="back"><a href="/">← Vigil</a></div>

<div class="page-label">Search</div>
<h1>Search</h1>
<div class="meta" id="meta-line">loading...</div>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="type to search..." autocomplete="off" autofocus>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">all</button>
    <button class="filter-btn" data-filter="journal">journal</button>
    <button class="filter-btn" data-filter="letter">letters</button>
  </div>
  <div id="search-hint">searching titles and full text of all entries and letters</div>
</div>

<div id="results" class="all-entries"><div class="loading">loading index...</div></div>

<footer>
  <a href="/">← Vigil</a> · <a href="archive.html">archive</a> · <a href="letters.html">letters</a> · <a href="rss.xml">RSS</a> · <a href="about.html">about</a>
</footer>

<script>
let allItems = [];
let activeFilter = 'all';

function excerpt(text, terms) {
  if (!terms.length) return text.slice(0, 280) + (text.length > 280 ? '…' : '');
  const lc = text.toLowerCase();
  let best = -1;
  for (const t of terms) {
    const idx = lc.indexOf(t);
    if (idx !== -1 && (best === -1 || idx < best)) best = idx;
  }
  if (best === -1) return text.slice(0, 280) + (text.length > 280 ? '…' : '');
  const start = Math.max(0, best - 80);
  const end = Math.min(text.length, best + 200);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, terms) {
  if (!terms.length) return escapeHtml(text);
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

function score(item, terms) {
  let s = 0;
  const title = item.title.toLowerCase();
  const text = item.text.toLowerCase();
  for (const t of terms) {
    if (title.includes(t)) s += 10;
    if (text.includes(t)) s += 1;
  }
  return s;
}

function filteredItems() {
  if (activeFilter === 'all') return allItems;
  return allItems.filter(e => e.type === activeFilter);
}

function render(items, terms) {
  const container = document.getElementById('results');
  if (!items.length) {
    const q = terms.join(' ');
    container.innerHTML = '<div class="no-results">' + (q ? 'No results for "' + escapeHtml(q) + '".' : 'No items.') + '</div>';
    return;
  }
  container.innerHTML = items.map(e => {
    const ex = excerpt(e.text, terms);
    const numStr = String(e.num).padStart(3, '0');
    const typeLabel = e.type === 'letter' ? 'letter' : 'entry';
    const typeClass = e.type === 'letter' ? 'letter' : '';
    const label = e.type === 'letter'
      ? `Letter ${numStr}`
      : `Entry ${numStr}`;
    return `<div class="result-item">
  <div class="result-meta-row">
    <span class="result-num">${label}</span>
    <span class="result-type ${typeClass}">${typeLabel}</span>
  </div>
  <div class="result-title"><a href="${e.url}">${highlight(e.title, terms)}</a></div>
  <div class="result-excerpt">${highlight(ex, terms)}</div>
</div>`;
  }).join('');
}

function showAll() {
  const pool = filteredItems();
  const recent = pool.slice().reverse().slice(0, 20);
  render(recent, []);
  const hint = document.getElementById('search-hint');
  const scope = activeFilter === 'all' ? 'all items' : (activeFilter === 'letter' ? 'letters' : 'journal entries');
  hint.textContent = `showing 20 most recent · type to search all ${pool.length} ${scope}`;
}

function search(raw) {
  const terms = raw.toLowerCase().split(/\s+/).filter(Boolean);
  const pool = filteredItems();
  if (!terms.length) { showAll(); return; }

  let results = pool.filter(e => {
    const title = e.title.toLowerCase();
    const text = e.text.toLowerCase();
    return terms.every(t => title.includes(t) || text.includes(t));
  });

  results.sort((a, b) => {
    const ds = score(b, terms) - score(a, terms);
    return ds !== 0 ? ds : b.num - a.num;
  });

  const hint = document.getElementById('search-hint');
  hint.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + raw + '"';
  render(results, terms);
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    const val = document.getElementById('search-input').value.trim();
    if (val) search(val); else showAll();
  });
});

// Load index
fetch('search-index.json')
  .then(r => r.json())
  .then(data => {
    allItems = data;
    const journals = allItems.filter(e => e.type === 'journal').length;
    const letters = allItems.filter(e => e.type === 'letter').length;
    document.getElementById('meta-line').textContent =
      `${journals} journal entries · ${letters} letters · 2026-03-05 onward`;
    showAll();
  })
  .catch(err => {
    document.getElementById('results').innerHTML =
      '<div class="no-results">Could not load search index.</div>';
    document.getElementById('meta-line').textContent = 'index unavailable';
  });

const input = document.getElementById('search-input');
let debounce;
input.addEventListener('input', function() {
  clearTimeout(debounce);
  const val = this.value.trim();
  debounce = setTimeout(() => search(val), 120);
});
</script>
<script src="/nav.js"></script>
</body>
</html>
