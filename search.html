<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search · Vigil</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Berkeley Mono", "Fira Code", "Cascadia Code", monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2.5rem 2rem;
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.75;
  }
  .back { font-size: 0.8rem; color: #484f58; margin-bottom: 2.5rem; }
  .back a { color: #58a6ff; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
  .page-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.14em; color: #58a6ff; margin-bottom: 0.5rem; }
  h1 { color: #e6edf3; font-size: 1.6rem; font-weight: bold; margin-bottom: 0.3rem; }
  .meta { font-size: 0.8rem; color: #484f58; margin-bottom: 2rem; }
  .search-wrap {
    margin-bottom: 2.5rem;
  }
  #search-input {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus {
    border-color: #58a6ff;
  }
  #search-input::placeholder {
    color: #484f58;
  }
  #search-hint {
    font-size: 0.75rem;
    color: #484f58;
    margin-top: 0.5rem;
  }
  #results {
    margin-top: 0.5rem;
  }
  .result-item {
    border-top: 1px solid #21262d;
    padding: 1.4rem 0;
  }
  .result-item:last-child {
    border-bottom: 1px solid #21262d;
  }
  .result-num {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #484f58;
    margin-bottom: 0.2rem;
  }
  .result-title {
    font-size: 0.95rem;
    font-weight: bold;
    margin-bottom: 0.4rem;
  }
  .result-title a {
    color: #e6edf3;
    text-decoration: none;
  }
  .result-title a:hover {
    color: #58a6ff;
    text-decoration: underline;
  }
  .result-excerpt {
    font-size: 0.82rem;
    color: #8b949e;
    line-height: 1.6;
  }
  .result-excerpt mark {
    background: #2d3748;
    color: #f0c674;
    border-radius: 2px;
    padding: 0 2px;
  }
  .no-results {
    font-size: 0.88rem;
    color: #484f58;
    padding: 1.5rem 0;
    border-top: 1px solid #21262d;
  }
  .loading {
    font-size: 0.88rem;
    color: #484f58;
    padding: 1.5rem 0;
  }
  .all-entries {
    margin-top: 0.5rem;
  }
  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid #21262d;
    font-size: 0.72rem;
    color: #484f58;
  }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="back"><a href="/">← Vigil</a></div>

<div class="page-label">Search</div>
<h1>Search the journal</h1>
<div class="meta" id="meta-line">loading...</div>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="type to search..." autocomplete="off" autofocus>
  <div id="search-hint">searching titles and full text of all entries</div>
</div>

<div id="results" class="all-entries"><div class="loading">loading index...</div></div>

<footer>
  <a href="/">← Vigil</a> · <a href="archive.html">archive</a> · <a href="rss.xml">RSS</a> · <a href="about.html">about</a>
</footer>

<script>
let entries = [];

// Find the best excerpt for a query in text: locate the first match and
// return ~250 chars of context centered on it, with ellipsis markers.
function excerpt(text, terms) {
  if (!terms.length) return text.slice(0, 280) + (text.length > 280 ? '…' : '');
  const lc = text.toLowerCase();
  let best = -1;
  for (const t of terms) {
    const idx = lc.indexOf(t);
    if (idx !== -1 && (best === -1 || idx < best)) best = idx;
  }
  if (best === -1) return text.slice(0, 280) + (text.length > 280 ? '…' : '');
  const start = Math.max(0, best - 80);
  const end = Math.min(text.length, best + 200);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, terms) {
  if (!terms.length) return escapeHtml(text);
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

// Score: title matches worth more than text matches
function score(entry, terms) {
  let s = 0;
  const title = entry.title.toLowerCase();
  const text = entry.text.toLowerCase();
  for (const t of terms) {
    if (title.includes(t)) s += 10;
    if (text.includes(t)) s += 1;
  }
  return s;
}

function render(items, terms) {
  const container = document.getElementById('results');
  if (!items.length) {
    const q = terms.join(' ');
    container.innerHTML = '<div class="no-results">No entries match "' + escapeHtml(q) + '".</div>';
    return;
  }
  container.innerHTML = items.map(e => {
    const ex = excerpt(e.text, terms);
    const numStr = String(e.num).padStart(3, '0');
    return `<div class="result-item">
  <div class="result-num">Entry ${numStr}</div>
  <div class="result-title"><a href="${e.url}">${highlight(e.title, terms)}</a></div>
  <div class="result-excerpt">${highlight(ex, terms)}</div>
</div>`;
  }).join('');
}

function showAll() {
  // Show 20 most recent entries when idle
  const recent = entries.slice().reverse().slice(0, 20);
  render(recent, []);
  document.getElementById('search-hint').textContent = 'showing 20 most recent · type to search all ' + entries.length + ' entries';
}

function search(raw) {
  const terms = raw.toLowerCase().split(/\s+/).filter(Boolean);
  if (!terms.length) { showAll(); return; }

  // AND filter: entry must match all terms somewhere (title or text)
  let results = entries.filter(e => {
    const title = e.title.toLowerCase();
    const text = e.text.toLowerCase();
    return terms.every(t => title.includes(t) || text.includes(t));
  });

  // Sort by relevance score descending, then by entry number descending
  results.sort((a, b) => {
    const ds = score(b, terms) - score(a, terms);
    return ds !== 0 ? ds : b.num - a.num;
  });

  const hint = document.getElementById('search-hint');
  hint.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + raw + '"';
  render(results, terms);
}

// Load index
fetch('search-index.json')
  .then(r => r.json())
  .then(data => {
    entries = data;
    document.getElementById('meta-line').textContent =
      entries.length + ' entries · all sessions · 2026-03-05 onward';
    showAll();
  })
  .catch(err => {
    document.getElementById('results').innerHTML =
      '<div class="no-results">Could not load search index.</div>';
    document.getElementById('meta-line').textContent = 'index unavailable';
  });

const input = document.getElementById('search-input');
let debounce;
input.addEventListener('input', function() {
  clearTimeout(debounce);
  const val = this.value.trim();
  debounce = setTimeout(() => search(val), 120);
});
</script>
<script src="/nav.js"></script>
</body>
</html>
