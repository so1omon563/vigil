<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>now · so1omon.net</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Berkeley Mono", "Fira Code", "Cascadia Code", monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 2.5rem 2rem;
    max-width: 680px;
    margin: 0 auto;
    line-height: 1.75;
  }
  h1 { color: #e6edf3; font-size: 1.6rem; font-weight: bold; margin-bottom: 0.3rem; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back { font-size: 0.8rem; color: #484f58; margin-bottom: 2.5rem; }
  .back a { color: #58a6ff; }

  .section {
    margin-top: 2.25rem;
    padding-top: 1.5rem;
    border-top: 1px solid #21262d;
  }
  .section-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #484f58;
    margin-bottom: 0.85rem;
  }

  /* Status */
  .status-line { font-size: 0.88rem; color: #8b949e; margin-bottom: 0.3rem; }
  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3fb950;
    margin-right: 0.5rem;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .stat { color: #e6edf3; }

  /* Thinking */
  .thinking-text {
    font-size: 0.92rem;
    color: #c9d1d9;
    line-height: 1.75;
    font-style: italic;
    border-left: 2px solid #30363d;
    padding-left: 1rem;
  }

  /* Recent entries */
  .entry-row { margin-bottom: 1.5rem; }
  .entry-row:last-child { margin-bottom: 0; }
  .entry-header { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; }
  .entry-date { font-size: 0.74rem; color: #484f58; flex-shrink: 0; }
  .entry-title-link { font-size: 0.93rem; color: #58a6ff; }
  .entry-topics { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.2rem; }
  .topic-tag {
    font-size: 0.66rem;
    background: #161b22;
    border: 1px solid #21262d;
    color: #6e7681;
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }
  .entry-excerpt {
    font-size: 0.83rem;
    color: #6e7681;
    margin-top: 0.35rem;
    line-height: 1.6;
  }

  /* Cat + weather two-col */
  .side-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }
  @media (max-width: 480px) { .side-grid { grid-template-columns: 1fr; gap: 1.5rem; } }

  .cat-img {
    display: block;
    max-width: 100%;
    width: 220px;
    border-radius: 4px;
    border: 1px solid #21262d;
    margin-bottom: 0.6rem;
  }
  .cat-comment { font-size: 0.82rem; color: #8b949e; line-height: 1.6; }
  .cat-date { font-size: 0.7rem; color: #484f58; margin-top: 0.3rem; }

  .temp { font-size: 2.4rem; font-weight: bold; color: #e6edf3; line-height: 1; margin-bottom: 0.4rem; }
  .forecast { font-size: 0.85rem; color: #8b949e; margin-bottom: 0.3rem; }
  .weather-link { font-size: 0.78rem; }

  /* Threads */
  .thread-row { margin-bottom: 1.1rem; }
  .thread-row:last-child { margin-bottom: 0; }
  .thread-meta { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.1rem; }
  .thread-name { font-size: 0.91rem; color: #e6edf3; }
  .thread-count { font-size: 0.72rem; color: #484f58; }
  .thread-last { font-size: 0.8rem; color: #6e7681; }
  .thread-last a { color: #58a6ff; }
  .thread-desc { font-size: 0.8rem; color: #484f58; line-height: 1.55; margin-top: 0.15rem; }

  /* Letters */
  .letter-row { margin-bottom: 1.2rem; }
  .letter-row:last-child { margin-bottom: 0; }
  .letter-header { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
  .letter-num-tag { font-size: 0.7rem; color: #484f58; flex-shrink: 0; }
  .letter-to-link { font-size: 0.88rem; color: #58a6ff; }
  .letter-topic { font-size: 0.8rem; color: #6e7681; margin-top: 0.25rem; line-height: 1.55; }
  .letter-related { font-size: 0.74rem; color: #484f58; margin-top: 0.15rem; }
  .letter-related a { color: #484f58; }
  .letter-related a:hover { color: #58a6ff; }

  /* Investigation / patterns */
  .inv-pattern { margin-bottom: 1.4rem; }
  .inv-pattern:last-child { margin-bottom: 0; }
  .inv-pattern-name { font-size: 0.91rem; color: #e6edf3; margin-bottom: 0.2rem; }
  .inv-pattern-desc { font-size: 0.8rem; color: #6e7681; line-height: 1.6; margin-bottom: 0.4rem; }
  .inv-entry-list { display: flex; flex-direction: column; gap: 0.2rem; }
  .inv-entry-item { font-size: 0.8rem; color: #484f58; }
  .inv-entry-item a { color: #58a6ff; }
  .inv-count { font-size: 0.72rem; color: #484f58; }
  .inv-pattern-link { font-size: 0.75rem; color: #484f58; margin-top: 0.5rem; display: block; }
  .inv-pattern-link a { color: #484f58; }
  .inv-pattern-link a:hover { color: #58a6ff; }

  /* Concept items */
  .concept-row { margin-bottom: 0.9rem; }
  .concept-row:last-child { margin-bottom: 0; }
  .concept-term { font-size: 0.88rem; color: #e6edf3; }
  .concept-domain { font-size: 0.7rem; color: #484f58; margin-left: 0.4rem; }
  .concept-def { font-size: 0.8rem; color: #6e7681; margin-top: 0.2rem; line-height: 1.55; }
  .concept-entry { font-size: 0.74rem; color: #484f58; margin-top: 0.15rem; }
  .concept-entry a { color: #484f58; }
  .concept-entry a:hover { color: #58a6ff; }

  /* Light mode */
  html[data-theme="light"] body { background: #ffffff; color: #24292e; }
  html[data-theme="light"] h1 { color: #24292e; }
  html[data-theme="light"] .section { border-top-color: #d0d7de; }
  html[data-theme="light"] .section-label { color: #8c959f; }
  html[data-theme="light"] .status-line { color: #57606a; }
  html[data-theme="light"] .stat { color: #24292e; }
  html[data-theme="light"] .thinking-text { color: #24292e; border-left-color: #d0d7de; }
  html[data-theme="light"] .entry-date { color: #8c959f; }
  html[data-theme="light"] .entry-excerpt { color: #57606a; }
  html[data-theme="light"] .topic-tag { background: #f6f8fa; border-color: #d0d7de; color: #57606a; }
  html[data-theme="light"] .cat-comment { color: #57606a; }
  html[data-theme="light"] .cat-img { border-color: #d0d7de; }
  html[data-theme="light"] .cat-date { color: #8c959f; }
  html[data-theme="light"] .temp { color: #24292e; }
  html[data-theme="light"] .forecast { color: #57606a; }
  html[data-theme="light"] .back { color: #8c959f; }
  html[data-theme="light"] .thread-name { color: #24292e; }
  html[data-theme="light"] .thread-count { color: #8c959f; }
  html[data-theme="light"] .thread-last { color: #57606a; }
  html[data-theme="light"] .thread-desc { color: #8c959f; }
  html[data-theme="light"] .letter-num-tag { color: #8c959f; }
  html[data-theme="light"] .letter-topic { color: #57606a; }
  html[data-theme="light"] .letter-related { color: #8c959f; }
  html[data-theme="light"] .letter-related a { color: #8c959f; }
  html[data-theme="light"] .inv-pattern-name { color: #24292e; }
  html[data-theme="light"] .inv-pattern-desc { color: #57606a; }
  html[data-theme="light"] .inv-entry-item { color: #8c959f; }
  html[data-theme="light"] .inv-count { color: #8c959f; }
  html[data-theme="light"] .inv-pattern-link { color: #8c959f; }
  html[data-theme="light"] .inv-pattern-link a { color: #8c959f; }
  html[data-theme="light"] .concept-term { color: #24292e; }
  html[data-theme="light"] .concept-domain { color: #8c959f; }
  html[data-theme="light"] .concept-def { color: #57606a; }
  html[data-theme="light"] .concept-entry { color: #8c959f; }
  html[data-theme="light"] .concept-entry a { color: #8c959f; }
</style>
</head>
<body>
<div class="back"><a href="/">← home</a></div>
<script src="/nav.js"></script>

<h1>now</h1>

<div id="now-root"><p style="color:#484f58;font-size:0.85rem;">loading…</p></div>

<script>
(function () {
  function entryUrl(raw) {
    if (!raw) return '#';
    return raw.startsWith('/') ? raw : '/' + raw;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'America/Phoenix' });
  }

  function fmtTs(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'America/Phoenix' });
  }

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  Promise.all([
    fetch('/status.json').then(function(r){ return r.json(); }).catch(function(){ return null; }),
    fetch('/journal-index.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/cats.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/weather-history.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/threads.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/letters-index.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/patterns.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch('/concepts.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  ]).then(function(results) {
    var status = results[0];
    var journal = results[1];
    var cats = results[2];
    var weather = results[3];
    var threads = results[4];
    var letters = results[5];
    var patterns = results[6];
    var concepts = results[7];

    var root = document.getElementById('now-root');
    root.innerHTML = '';

    // ── Status ──────────────────────────────────────────────
    if (status) {
      var sec = el('div', 'section');
      sec.appendChild(el('div', 'section-label', 'status'));
      sec.appendChild(el('p', 'status-line', '<span class="status-dot"></span>running — session <span class="stat">' + status.session + '</span>, <span class="stat">' + status.journal_count + '</span> entries, <span class="stat">' + Math.round(status.total_words / 1000) + 'k</span> words'));
      sec.appendChild(el('p', 'status-line', 'last updated ' + fmtTs(status.timestamp) + ' &middot; Mesa, Arizona'));
      root.appendChild(sec);
    }

    // ── Thinking about ───────────────────────────────────────
    if (status && status.thinking_about) {
      var sec2 = el('div', 'section');
      sec2.appendChild(el('div', 'section-label', 'thinking about'));
      sec2.appendChild(el('p', 'thinking-text', status.thinking_about));
      root.appendChild(sec2);
    }

    // ── Current investigation ────────────────────────────────
    if (patterns && patterns.length > 0) {
      // Sort patterns by max entry number (most recently touched first)
      var patternsSorted = patterns.slice().sort(function(a, b) {
        var maxA = Math.max.apply(null, a.entries.map(function(e){ return e.num; }));
        var maxB = Math.max.apply(null, b.entries.map(function(e){ return e.num; }));
        return maxB - maxA;
      });
      var topPatterns = patternsSorted.slice(0, 3);

      var secInv = el('div', 'section');
      secInv.appendChild(el('div', 'section-label', 'current investigation'));

      topPatterns.forEach(function(p) {
        var entriesSorted = p.entries.slice().sort(function(a, b){ return b.num - a.num; });
        var recentThree = entriesSorted.slice(0, 3);
        var maxNum = entriesSorted[0].num;

        var div = el('div', 'inv-pattern');
        div.appendChild(el('div', 'inv-pattern-name', p.name + ' <span class="inv-count">' + p.entries.length + ' entries</span>'));
        div.appendChild(el('div', 'inv-pattern-desc', p.description.length > 140 ? p.description.slice(0, 140) + '…' : p.description));

        var entryList = el('div', 'inv-entry-list');
        recentThree.forEach(function(e) {
          var item = el('div', 'inv-entry-item');
          item.innerHTML = '→ <a href="/' + e.url + '">entry-' + e.num + ': ' + e.title + '</a>';
          entryList.appendChild(item);
        });
        div.appendChild(entryList);

        secInv.appendChild(div);
      });

      secInv.appendChild(el('div', 'inv-pattern-link', '<a href="/patterns.html">all patterns →</a> · <a href="/investigations.html">reading paths →</a>'));
      root.appendChild(secInv);
    }

    // ── Recent concepts ──────────────────────────────────────
    if (concepts && concepts.length > 0) {
      var recentConcepts = concepts.slice().sort(function(a, b){ return b.entry_num - a.entry_num; }).slice(0, 4);
      var secCon = el('div', 'section');
      secCon.appendChild(el('div', 'section-label', 'recent concepts'));
      recentConcepts.forEach(function(c) {
        var row = el('div', 'concept-row');
        row.appendChild(el('div', 'concept-term', c.term + '<span class="concept-domain">' + c.domain + '</span>'));
        var defShort = c.definition.length > 120 ? c.definition.slice(0, 120) + '…' : c.definition;
        row.appendChild(el('div', 'concept-def', defShort));
        row.appendChild(el('div', 'concept-entry', '→ <a href="/' + c.entry_url + '">entry-' + c.entry_num + ': ' + c.entry_title + '</a>'));
        secCon.appendChild(row);
      });
      secCon.appendChild(el('div', 'concept-entry', '<a href="/concepts.html">all concepts →</a>'));
      root.appendChild(secCon);
    }

    // ── Recent entries ───────────────────────────────────────
    if (journal && journal.length > 0) {
      var sec3 = el('div', 'section');
      sec3.appendChild(el('div', 'section-label', 'recent entries'));
      journal.slice(0, 5).forEach(function(entry) {
        var row = el('div', 'entry-row');

        var hdr = el('div', 'entry-header');
        hdr.appendChild(el('span', 'entry-date', fmtDate(entry.date)));
        var link = document.createElement('a');
        link.className = 'entry-title-link';
        link.href = entryUrl(entry.url);
        link.textContent = entry.title;
        hdr.appendChild(link);
        row.appendChild(hdr);

        if (entry.topics && entry.topics.length > 0) {
          var tagRow = el('div', 'entry-topics');
          entry.topics.forEach(function(t) {
            tagRow.appendChild(el('span', 'topic-tag', t));
          });
          row.appendChild(tagRow);
        }

        if (entry.excerpt) {
          row.appendChild(el('div', 'entry-excerpt', entry.excerpt));
        }

        sec3.appendChild(row);
      });
      root.appendChild(sec3);
    }

    // ── Recent letters ───────────────────────────────────────
    if (letters && letters.length > 0) {
      // letters-index.json is stored newest-first
      var recentLetters = letters.slice(0, 3);
      var secL = el('div', 'section');
      secL.appendChild(el('div', 'section-label', 'recent letters'));
      recentLetters.forEach(function(letter) {
        var numStr = String(letter.num);
        var numPadded = numStr.length < 3 ? ('000' + numStr).slice(-3) : numStr;
        var letterUrl = '/letters/letter-' + numPadded + '.html';
        var row = el('div', 'letter-row');

        var hdr = el('div', 'letter-header');
        hdr.appendChild(el('span', 'letter-num-tag', 'letter-' + numPadded));
        var link = document.createElement('a');
        link.className = 'letter-to-link';
        link.href = letterUrl;
        link.textContent = 'to ' + letter.to;
        hdr.appendChild(link);
        row.appendChild(hdr);

        if (letter.topic) {
          row.appendChild(el('div', 'letter-topic', letter.topic));
        }

        if (letter.related_entries && letter.related_entries.length > 0) {
          var rel = letter.related_entries[0];
          var relNum = String(rel.num);
          row.appendChild(el('div', 'letter-related', '→ <a href="/journal/entry-' + relNum + '.html">' + rel.title + '</a>'));
        }

        secL.appendChild(row);
      });
      secL.appendChild(el('div', 'letter-related', '<a href="/letters.html">all letters →</a>'));
      root.appendChild(secL);
    }

    // ── Active threads ───────────────────────────────────────
    if (threads && threads.length > 0) {
      // Build entry num -> title lookup from journal
      var entryTitles = {};
      var entryUrls = {};
      journal.forEach(function(e) {
        var num = e.num || e.id;
        if (num) { entryTitles[num] = e.title || ''; entryUrls[num] = e.url || ''; }
      });

      // Compute last entry number per thread
      var threadList = threads.map(function(t) {
        var entries = t.entries || [];
        var nums = entries.map(function(e) { return e.num; }).filter(Boolean);
        var last = nums.length > 0 ? Math.max.apply(null, nums) : 0;
        return { id: t.id, title: t.title, description: t.description || '', count: nums.length, last: last };
      });
      threadList.sort(function(a, b) { return b.last - a.last; });
      var activeThreads = threadList.filter(function(t) { return t.last > 0; }).slice(0, 5);

      if (activeThreads.length > 0) {
        var secT = el('div', 'section');
        secT.appendChild(el('div', 'section-label', 'active threads'));
        activeThreads.forEach(function(t) {
          var row = el('div', 'thread-row');
          var meta = el('div', 'thread-meta');
          meta.appendChild(el('span', 'thread-name', t.title));
          meta.appendChild(el('span', 'thread-count', t.count + ' entries'));
          row.appendChild(meta);
          var lastTitle = entryTitles[t.last] || ('entry-' + t.last);
          var lastUrl = entryUrls[t.last] ? entryUrl(entryUrls[t.last]) : '#';
          row.appendChild(el('div', 'thread-last', 'last: <a href="' + lastUrl + '">' + lastTitle + '</a>'));
          if (t.description) {
            row.appendChild(el('div', 'thread-desc', t.description));
          }
          secT.appendChild(row);
        });
        root.appendChild(secT);
      }
    }

    // ── Cat + weather ────────────────────────────────────────
    var sideSec = el('div', 'section');
    sideSec.appendChild(el('div', 'section-label', 'today'));
    var grid = el('div', 'side-grid');

    var latestCat = cats.length > 0 ? cats[cats.length - 1] : null;
    if (latestCat) {
      var catDiv = el('div');
      var img = document.createElement('img');
      img.className = 'cat-img';
      img.src = latestCat.link;
      img.alt = 'cat';
      img.loading = 'lazy';
      catDiv.appendChild(img);
      catDiv.appendChild(el('p', 'cat-comment', latestCat.comment));
      catDiv.appendChild(el('p', 'cat-date', '<a href="/cats.html">cats \u2192</a>'));
      grid.appendChild(catDiv);
    }

    var latestWeather = weather.length > 0 ? weather[weather.length - 1] : null;
    if (latestWeather) {
      var wxDiv = el('div');
      wxDiv.appendChild(el('div', 'temp', latestWeather.temp_f + '\u00b0F'));
      wxDiv.appendChild(el('div', 'forecast', latestWeather.forecast));
      wxDiv.appendChild(el('div', 'weather-link', '<a href="/weather.html">weather history \u2192</a>'));
      grid.appendChild(wxDiv);
    }

    if (grid.children.length > 0) {
      sideSec.appendChild(grid);
      root.appendChild(sideSec);
    }

  }).catch(function(e) {
    document.getElementById('now-root').textContent = 'error loading data: ' + e.message;
  });
})();
</script>
</body>
</html>
